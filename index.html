<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>電源產品查詢</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Share+Tech+Mono&display=swap');

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2330;
    --border: #2a3441;
    --accent-of: #39d353;
    --accent-en: #58a6ff;
    --accent3: #f0883e;
    --accent-red: #ff7b72;
    --text: #e6edf3;
    --text-muted: #7d8590;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    padding-bottom: 60px;
  }

  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 16px 12px;
  }
  .header-eyebrow {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; letter-spacing: 0.22em;
    color: var(--text-muted); text-transform: uppercase; margin-bottom: 3px;
  }
  .header-title { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }

  .tab-bar {
    display: flex; background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 12px; gap: 4px;
  }
  .tab {
    flex: 1; padding: 10px 4px; text-align: center;
    font-size: 13px; font-weight: 500; color: var(--text-muted);
    cursor: pointer; border-bottom: 2.5px solid transparent;
    transition: all 0.18s; user-select: none;
  }
  .tab.active-of  { color: var(--accent-of);  border-bottom-color: var(--accent-of); }
  .tab.active-en  { color: var(--accent-en);  border-bottom-color: var(--accent-en); }
  .tab.active-all { color: var(--accent3);    border-bottom-color: var(--accent3); }

  /* Filter panel */
  .filter-panel {
    background: var(--bg);
    padding: 10px 14px 4px;
    border-bottom: 1px solid var(--border);
  }
  .filter-row {
    display: flex; align-items: flex-start;
    gap: 8px; margin-bottom: 10px;
  }
  .filter-label {
    font-size: 10px; font-family: 'Share Tech Mono', monospace;
    color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase;
    padding-top: 6px; flex-shrink: 0; width: 26px;
  }
  .btn-group { display: flex; flex-wrap: wrap; gap: 6px; flex: 1; }

  .flt-btn {
    padding: 5px 11px; border-radius: 8px;
    font-size: 12px; font-weight: 500; cursor: pointer;
    border: 1.5px solid var(--border); background: var(--surface);
    color: var(--text-muted); transition: all 0.15s; white-space: nowrap;
    font-family: 'Share Tech Mono', monospace; user-select: none;
  }
  .flt-btn:active { transform: scale(0.93); }
  .flt-btn.watt.sel { background: rgba(57,211,83,0.18); border-color: var(--accent-of); color: var(--accent-of); }
  .flt-btn.volt.sel { background: rgba(88,166,255,0.18); border-color: var(--accent-en); color: var(--accent-en); }
  .flt-btn.ind.sel  { background: rgba(240,136,62,0.18); border-color: var(--accent3);  color: var(--accent3); }

  /* Active tags bar */
  .clear-filters {
    display: none; align-items: center; gap: 6px;
    padding: 8px 14px; background: var(--surface2);
    border-bottom: 1px solid var(--border); flex-wrap: wrap;
  }
  .clear-filters.visible { display: flex; }
  .tags-row { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
  .clear-tag {
    display: flex; align-items: center; gap: 4px;
    padding: 3px 8px 3px 10px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 20px;
    font-size: 11px; font-family: 'Share Tech Mono', monospace;
  }
  .clear-tag b { color: var(--text); font-weight: 600; }
  .clear-tag .x {
    cursor: pointer; color: var(--text-muted); font-size: 10px;
    padding: 0 2px; transition: color 0.1s;
  }
  .clear-tag .x:hover { color: var(--accent-red); }
  .clear-all-btn {
    padding: 4px 12px; background: transparent;
    border: 1px solid var(--border); border-radius: 20px;
    font-size: 11px; color: var(--text-muted); cursor: pointer;
    white-space: nowrap; transition: all 0.15s; flex-shrink: 0;
  }
  .clear-all-btn:hover { border-color: var(--accent-red); color: var(--accent-red); }

  /* Result meta */
  .result-meta {
    padding: 7px 16px 4px;
    font-size: 11px; font-family: 'Share Tech Mono', monospace; color: var(--text-muted);
  }
  .result-meta b { color: var(--text); font-weight: 700; }

  /* Cards */
  .cards { padding: 4px 12px; display: flex; flex-direction: column; gap: 10px; }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 15px;
    position: relative; overflow: hidden; transition: transform 0.12s;
  }
  .card:active { transform: scale(0.985); }
  .card::before {
    content: ''; position: absolute;
    left: 0; top: 0; bottom: 0; width: 3px; border-radius: 14px 0 0 14px;
  }
  .card.type-of { border-color: rgba(57,211,83,0.3); background: rgba(57,211,83,0.05); }
  .card.type-of::before { background: var(--accent-of); }
  .card.type-en { border-color: rgba(88,166,255,0.3); background: rgba(88,166,255,0.05); }
  .card.type-en::before { background: var(--accent-en); }

  .card-header {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 10px; padding-left: 8px; gap: 8px;
  }
  .card-left { display: flex; flex-direction: column; gap: 3px; flex: 1; min-width: 0; }
  .card-model {
    font-family: 'Share Tech Mono', monospace; font-size: 14px;
    letter-spacing: 0.04em; line-height: 1.2; word-break: break-all;
  }
  .card.type-of .card-model { color: var(--accent-of); }
  .card.type-en .card-model { color: var(--accent-en); }
  .type-badge {
    font-size: 9px; font-family: 'Share Tech Mono', monospace;
    letter-spacing: 0.12em; padding: 2px 6px; border-radius: 4px;
    display: inline-block; width: fit-content;
  }
  .card.type-of .type-badge { background: rgba(57,211,83,0.15); color: var(--accent-of); }
  .card.type-en .type-badge { background: rgba(88,166,255,0.15); color: var(--accent-en); }
  .card-watt {
    font-size: 19px; font-weight: 700; font-family: 'Share Tech Mono', monospace;
    flex-shrink: 0; white-space: nowrap;
  }
  .card.type-of .card-watt { color: var(--accent-of); }
  .card.type-en .card-watt { color: var(--accent-en); }

  .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding-left: 8px; }
  .card-field { display: flex; flex-direction: column; gap: 2px; }
  .field-label {
    font-size: 10px; color: var(--text-muted); letter-spacing: 0.07em;
    text-transform: uppercase; font-family: 'Share Tech Mono', monospace;
  }
  .field-value { font-size: 13px; color: #ffd760; font-weight: 600; }
  .note-val { color: var(--accent-red); }
  .note-val.dev { color: #f0883e; }
  .note-val.crps { color: var(--accent-en); }
  .size-note { font-size: 9px; color: var(--text-muted); font-family: 'Share Tech Mono', monospace; }


  /* Product image */
  .card-img-wrap {
    width: 100%;
    height: 140px;
    overflow: hidden;
    border-radius: 8px;
    margin-bottom: 12px;
    background: #0a0f15;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card-img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: center;
    padding: 6px;
  }

  .pdf-btn {
    display: inline-flex; align-items: center; gap: 4px;
    margin-top: 10px; margin-left: 6px; padding: 5px 12px;
    background: transparent; border: 1px solid var(--border); border-radius: 8px;
    color: var(--text-muted); font-size: 11px; cursor: pointer;
    font-family: 'Share Tech Mono', monospace; transition: all 0.15s;
    text-decoration: none;
  }
  .pdf-btn:hover { border-color: #e57373; color: #e57373; }

  .copy-btn {
    display: inline-flex; align-items: center; gap: 4px;
    margin-top: 10px; margin-left: 8px; padding: 5px 12px;
    background: transparent; border: 1px solid var(--border); border-radius: 8px;
    color: var(--text-muted); font-size: 11px; cursor: pointer;
    font-family: 'Share Tech Mono', monospace; transition: all 0.15s;
  }
  .card.type-of .copy-btn:hover { border-color: var(--accent-of); color: var(--accent-of); }
  .card.type-en .copy-btn:hover { border-color: var(--accent-en); color: var(--accent-en); }
  .copy-btn.copied { border-color: var(--accent3) !important; color: var(--accent3) !important; }

  mark {
    background: rgba(240,136,62,0.32); color: var(--accent3);
    border-radius: 2px; padding: 0 1px; font-weight: 700;
  }
  .no-result { text-align: center; padding: 60px 20px; color: var(--text-muted); display: none; }
  .no-result .icon { font-size: 44px; margin-bottom: 14px; }
  .no-result p { font-size: 14px; line-height: 1.7; }
</style>
</head>
<body>

<div class="header">
  <div class="header-eyebrow">Product Search</div>
  <div class="header-title">電源產品查詢</div>
</div>

<div class="tab-bar" id="tabBar">
  <div class="tab active-all" data-type="all">全部</div>
  <div class="tab" data-type="of">Open Frame</div>
  <div class="tab" data-type="en">Enclosed</div>
</div>

<div class="filter-panel">
  <div class="filter-row">
    <div class="filter-label">W</div>
    <div class="btn-group" id="wattBtns"></div>
  </div>
  <div class="filter-row">
    <div class="filter-label">V</div>
    <div class="btn-group" id="voltBtns"></div>
  </div>
</div>

<div class="clear-filters" id="clearFilters">
  <div class="tags-row" id="activeTagsWrap"></div>
  <button class="clear-all-btn" id="clearAllBtn">✕ 清除全部</button>
</div>

<div class="result-meta" id="resultMeta"></div>
<div class="cards" id="cardsContainer"></div>
<div class="no-result" id="noResult">
  <div class="icon">🔎</div>
  <p>找不到符合的結果<br>請嘗試其他組合</p>
</div>

let activeType = "all";
let selWatts   = new Set();
let selVolts   = new Set();

/* extract voltage numbers from a dataset */
function extractVolts(data) {
  const nums = new Set();
  data.forEach(item => {
    (item.voltage.match(/\d+\.?\d*/g)||[]).forEach(n => nums.add(n));
  });
  return [...nums].map(Number).filter(n=>n>=3).sort((a,b)=>a-b).map(String);
}

function extractInds(data) {
  const s = new Set();
  data.forEach(item => item.industry.split(/[、,]/).forEach(i=>{ if(i.trim()) s.add(i.trim()); }));
  return [...s].sort();
}

  if (activeType==='en') return enclosed;
  return allData;
}

/* Build buttons */
function buildBtns(containerId, cls, values, selSet, clickCb) {
  const c = document.getElementById(containerId);
  c.innerHTML = '';
  values.forEach(v => {
    const btn = document.createElement('button');
    btn.className = `flt-btn ${cls}` + (selSet.has(v) ? ' sel' : '');
    btn.textContent = cls==='volt' ? v+'V' : v;
    btn.addEventListener('click', () => clickCb(v));
    c.appendChild(btn);
  });
}

function rebuildBtns() {
  const data = getActiveData();
  // watt — sort numerically
  const watts = [...new Set(data.map(d=>d.watt))].sort((a,b)=>parseFloat(a)-parseFloat(b));
  buildBtns('wattBtns', 'watt', watts, selWatts, v=>{ toggle(selWatts,v); rebuildAll(); });
  buildBtns('voltBtns', 'volt', extractVolts(data), selVolts, v=>{ toggle(selVolts,v); rebuildAll(); });
}

function toggle(set, val) { set.has(val) ? set.delete(val) : set.add(val); }

/* Filter */
function getFiltered() {
  return allData.filter(item => {
    if (activeType!=='all' && item.type!==activeType) return false;
    if (selWatts.size>0 && !selWatts.has(item.watt)) return false;
    if (selVolts.size>0) {
      const nums = item.voltage.match(/\d+\.?\d*/g)||[];
      if (![...selVolts].some(v=>nums.includes(v))) return false;
    }
    return true;
  });
}

/* Highlight */
function hl(text, terms) {
  if (!terms.length) return text;
  const esc = terms.map(t=>t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('|');
  return text.replace(new RegExp(`(${esc})`,'gi'),'<mark>$1</mark>');
}

function getTerms() {
  return [
    ...[...selWatts].map(w=>w.replace('W','')),
    ...[...selVolts],
  ];
}

/* Render tags */
function renderTags() {
  const wrap = document.getElementById('activeTagsWrap');
  const bar  = document.getElementById('clearFilters');
  wrap.innerHTML = '';
  const all = [
    ...[...selWatts].map(v=>({label:v, set:selWatts, val:v})),
    ...[...selVolts].map(v=>({label:v+'V', set:selVolts, val:v})),
  ];
  if (!all.length) { bar.classList.remove('visible'); return; }
  bar.classList.add('visible');
  all.forEach(t => {
    const tag = document.createElement('div');
    tag.className = 'clear-tag';
    tag.innerHTML = `<b>${t.label}</b><span class="x">✕</span>`;
    tag.querySelector('.x').addEventListener('click', ()=>{ t.set.delete(t.val); rebuildAll(); });
    wrap.appendChild(tag);
  });
}

/* Render cards */
function renderCards() {
  const filtered = getFiltered();
  const terms = getTerms();
  const container = document.getElementById('cardsContainer');
  const noResult  = document.getElementById('noResult');
  const meta      = document.getElementById('resultMeta');
  container.innerHTML = '';

  const hasFilter = selWatts.size||selVolts.size||activeType!=='all';
  const ofC = filtered.filter(d=>d.type==='of').length;
  const enC = filtered.filter(d=>d.type==='en').length;

  meta.innerHTML = hasFilter
    ? `找到 <b>${filtered.length}</b> 筆` + (activeType==='all' ? ` &nbsp;·&nbsp; OF: ${ofC} &nbsp;·&nbsp; EN: ${enC}` : '')
    : `共 <b>${allData.length}</b> 筆 &nbsp;·&nbsp; Open Frame: ${openFrame.length} &nbsp;·&nbsp; Enclosed: ${enclosed.length}`;

  if (!filtered.length) { noResult.style.display='block'; return; }
  noResult.style.display='none';

  filtered.forEach(item => {
    const card = document.createElement('div');
    card.className = `card type-${item.type}`;
    const imgSrc = productImages[item.model] || '';
    card.innerHTML = `
      ${imgSrc ? `<div class="card-img-wrap"><img class="card-img" src="${imgSrc}" alt="${item.model}" loading="lazy"></div>` : ''}
      <div class="card-header">
        <div class="card-left">
          <div class="type-badge">${item.type==='of'?'OPEN FRAME':'ENCLOSED'}</div>
          <div class="card-model">${hl(item.model,terms)}</div>
        </div>
        <div class="card-watt">${hl(item.watt,terms)}</div>
      </div>
      <div class="card-grid">
        <div class="card-field">
          <div class="field-label">輸出電壓 (Vdc)</div>
          <div class="field-value">${hl(item.voltage,terms)}</div>
        </div>
        <div class="card-field">
          <div class="field-label">尺寸 <span class="size-note">${item.sizeNote}</span></div>
          <div class="field-value">${hl(item.size,terms)}</div>
        </div>
        <div class="card-field">
          <div class="field-label">產業</div>
          <div class="field-value">${hl(item.industry,terms)}</div>
        </div>
        ${item.note?`<div class="card-field"><div class="field-label">備註</div><div class="field-value note-val ${item.note==='研發中'?'dev':item.note==='CRPS'?'crps':''}">${item.note}</div></div>`:''}
      </div>
      <button class="copy-btn" data-model="${item.model}">📋 複製料號</button>
      ${item.specPdf ? `<a class="pdf-btn" href="${item.specPdf}" target="_blank">📄 規格書</a>` : ''}`;
    container.appendChild(card);
  });

  document.querySelectorAll('.copy-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      navigator.clipboard.writeText(btn.dataset.model).then(()=>{
        btn.textContent='✓ 已複製'; btn.classList.add('copied');
        setTimeout(()=>{ btn.textContent='📋 複製料號'; btn.classList.remove('copied'); },1500);
      });
    });
  });
}

function rebuildAll() { rebuildBtns(); renderTags(); renderCards(); }

/* Tabs */
document.getElementById('tabBar').addEventListener('click', e=>{
  const tab = e.target.closest('.tab');
  if (!tab) return;
  activeType = tab.dataset.type;
  document.querySelectorAll('.tab').forEach(t=>t.className='tab');
  tab.classList.add('tab',`active-${activeType}`);
  selWatts.clear(); selVolts.clear();
  rebuildAll();
});

document.getElementById('clearAllBtn').addEventListener('click',()=>{
  selWatts.clear(); selVolts.clear(); rebuildAll();
});

rebuildAll();
</script>
</body>
</html>
