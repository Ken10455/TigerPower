<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tiger Power 電源產品查詢</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #e6edf3; --text-muted: #8b949e;
    --accent-of: #39d353;
    --accent-en: #58a6ff;
    --accent-ad: #bc8cff;
    --accent3: #f0883e;
    --accent-red: #ff7b72;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', sans-serif; min-height: 100vh; padding-bottom: 60px; }

  .header { padding: 32px 20px 20px; text-align: center; }
  .header-eyebrow { font-size: 11px; letter-spacing: 3px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; }
  .header-title { font-size: 26px; font-weight: 700; letter-spacing: 1px; }

  .tab-bar { display: flex; gap: 0; padding: 0 20px; border-bottom: 1px solid var(--border); overflow-x: auto; }
  .tab { padding: 10px 18px; font-size: 13px; cursor: pointer; border-bottom: 2px solid transparent; color: var(--text-muted); white-space: nowrap; transition: all 0.15s; }
  .tab:hover { color: var(--text); }
  .tab.active-of  { color: var(--accent-of);  border-bottom-color: var(--accent-of); }
  .tab.active-en  { color: var(--accent-en);  border-bottom-color: var(--accent-en); }
  .tab.active-ad  { color: var(--accent-ad);  border-bottom-color: var(--accent-ad); }
  .tab.active-all { color: var(--accent3);    border-bottom-color: var(--accent3); }

  .filter-panel { padding: 14px 20px; display: flex; flex-direction: column; gap: 8px; border-bottom: 1px solid var(--border); }
  .filter-row { display: flex; align-items: flex-start; gap: 10px; flex-wrap: wrap; }
  .filter-label { font-size: 11px; font-weight: 700; color: var(--text-muted); letter-spacing: 1px; min-width: 20px; margin-top: 5px; }
  .btn-group { display: flex; flex-wrap: wrap; gap: 6px; }
  .filter-btn { padding: 3px 10px; border: 1px solid var(--border); border-radius: 20px; font-size: 12px; cursor: pointer; background: transparent; color: var(--text-muted); transition: all 0.12s; font-family: 'Share Tech Mono', monospace; }
  .filter-btn:hover { border-color: var(--accent3); color: var(--accent3); }
  .filter-btn.active { background: var(--accent3); border-color: var(--accent3); color: #000; font-weight: 700; }

  .clear-filters { padding: 8px 20px; display: none; align-items: center; gap: 8px; flex-wrap: wrap; }
  .clear-filters.visible { display: flex; }
  .tags-row { display: flex; flex-wrap: wrap; gap: 6px; flex: 1; }
  .active-tag { display: flex; align-items: center; gap: 4px; padding: 2px 8px; background: rgba(240,136,62,0.15); border: 1px solid var(--accent3); border-radius: 12px; font-size: 11px; color: var(--accent3); }
  .active-tag .rm { cursor: pointer; font-size: 10px; opacity: 0.7; }
  .active-tag .rm:hover { opacity: 1; }
  .clear-all-btn { padding: 2px 10px; border: 1px solid var(--border); border-radius: 12px; font-size: 11px; background: transparent; color: var(--text-muted); cursor: pointer; white-space: nowrap; }
  .clear-all-btn:hover { border-color: var(--accent-red); color: var(--accent-red); }

  .result-meta { padding: 10px 20px 0; font-size: 12px; color: var(--text-muted); }

  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; padding: 14px 20px; }

  .card { border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px 12px; position: relative; overflow: hidden; transition: border-color 0.15s; }
  .card::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%; }
  .card.type-of { border-color: rgba(57,211,83,0.3); background: rgba(57,211,83,0.05); }
  .card.type-of::before { background: var(--accent-of); }
  .card.type-en { border-color: rgba(88,166,255,0.3); background: rgba(88,166,255,0.05); }
  .card.type-en::before { background: var(--accent-en); }
  .card.type-ad { border-color: rgba(188,140,255,0.3); background: rgba(188,140,255,0.05); }
  .card.type-ad::before { background: var(--accent-ad); }
  .card:hover { border-color: rgba(255,255,255,0.15); }

  .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .card-model { font-family: 'Share Tech Mono', monospace; font-size: 15px; font-weight: 700; letter-spacing: 0.5px; }
  .card-watt { font-family: 'Share Tech Mono', monospace; font-size: 13px; color: var(--accent3); }
  .type-badge { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 700; letter-spacing: 0.5px; margin-top: 2px; }
  .type-of .type-badge  { background: rgba(57,211,83,0.15);  color: var(--accent-of); }
  .type-en .type-badge  { background: rgba(88,166,255,0.15); color: var(--accent-en); }
  .type-ad .type-badge  { background: rgba(188,140,255,0.15); color: var(--accent-ad); }

  .card-fields { display: flex; flex-direction: column; gap: 5px; }
  .card-field { display: flex; gap: 6px; font-size: 12px; }
  .field-label { color: var(--text-muted); min-width: 28px; }
  .field-value { color: var(--text); }

  .note-val { color: var(--accent-red); }
  .note-val.dev { color: #f0883e; }
  .note-val.crps { color: var(--accent-en); }
  .note-val.red { color: var(--accent-red); }

  .card-actions { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .copy-btn { padding: 4px 10px; border: 1px solid var(--border); border-radius: 8px;
    color: var(--text-muted); font-size: 11px; cursor: pointer;
    font-family: 'Share Tech Mono', monospace; transition: all 0.15s; background: transparent; }
  .card.type-of .copy-btn:hover { border-color: var(--accent-of); color: var(--accent-of); }
  .card.type-en .copy-btn:hover { border-color: var(--accent-en); color: var(--accent-en); }
  .card.type-ad .copy-btn:hover { border-color: var(--accent-ad); color: var(--accent-ad); }
  .copy-btn.copied { border-color: var(--accent3) !important; color: var(--accent3) !important; }

  mark { background: rgba(240,136,62,0.32); color: var(--accent3); border-radius: 2px; padding: 0 1px; font-weight: 700; }
  .no-result { text-align: center; padding: 60px 20px; color: var(--text-muted); display: none; }
  .no-result .icon { font-size: 44px; margin-bottom: 14px; }
  .no-result p { font-size: 14px; line-height: 1.7; }
</style>
</head>
<body>

<div class="header">
  <div class="header-eyebrow">Product Search</div>
  <div class="header-title">電源產品查詢</div>
</div>

<div class="tab-bar" id="tabBar">
  <div class="tab active-all" data-type="all">全部</div>
  <div class="tab" data-type="of">Open Frame</div>
  <div class="tab" data-type="en">Enclosed</div>
  <div class="tab" data-type="ad">Adaptor</div>
</div>

<div class="filter-panel">
  <div class="filter-row">
    <div class="filter-label">W</div>
    <div class="btn-group" id="wattBtns"></div>
  </div>
  <div class="filter-row">
    <div class="filter-label">V</div>
    <div class="btn-group" id="voltBtns"></div>
  </div>
  <div class="filter-row">
    <div class="filter-label">業</div>
    <div class="btn-group" id="indBtns"></div>
  </div>
</div>

<div class="clear-filters" id="clearFilters">
  <div class="tags-row" id="activeTagsWrap"></div>
  <button class="clear-all-btn" id="clearAllBtn">✕ 清除全部</button>
</div>

<div class="result-meta" id="resultMeta"></div>
<div class="cards" id="cardsContainer"></div>
<div class="no-result" id="noResult">
  <div class="icon">🔎</div>
  <p>找不到符合的結果<br>請嘗試其他組合</p>
</div>

<script>

  { watt:"650W",  model:"TN24-0650-01",  voltage:"雙組(12/54) PoE",       size:"101.6×152.4×33.8", sizeNote:"mm", industry:"網通",       note:"",           specPdf:"TN24-0650-01c.pdf" },

  { watt:"750W",  model:"TNA0750-XX",    voltage:"12/24/36/42/48/54",    size:"127×76.2×41",      sizeNote:"mm", industry:"網通、工業", note:"",           specPdf:"TNA0750-XX__SPEC.pdf" },
  { watt:"850W",  model:"TN17-0850-01",  voltage:"雙組(12/55)",           size:"98×210×33.8",      sizeNote:"mm", industry:"網通",       note:"研發中",      specPdf:"TN17-0850-01c.pdf" },
  { watt:"950W",  model:"TN15-0950-02",  voltage:"雙組(12/54)",           size:"127×254×41.5",     sizeNote:"mm", industry:"網通",       note:"",           specPdf:"TN15-0950-02c.pdf" },
  { watt:"950W",  model:"TN15-0950-03",  voltage:"雙組(12/54)",           size:"127×254×41.5",     sizeNote:"mm", industry:"網通",       note:"",           specPdf:"TN15-0950-03c.pdf" },
  { watt:"1000W", model:"TN19-1000-01",  voltage:"56",                   size:"100×210×33.5",     sizeNote:"mm", industry:"網通",       note:"",           specPdf:"TN19-1000-01c.pdf" },
  { watt:"1000W", model:"TN19-1500-01",  voltage:"55",                   size:"100×210×32.5",     sizeNote:"mm", industry:"網通",       note:"研發中",      specPdf:"TN19-1500-01c.pdf" },
  { watt:"1005W", model:"TN21-1005-01",  voltage:"雙組(12/-55)",          size:"127×254×41.5",     sizeNote:"mm", industry:"網通",       note:"",           specPdf:"TN21-1005-01c.pdf" },
].map(d=>({...d, type:"of"}));

const enclosed = [
  { watt:"90W",        model:"TG24-0090-01", voltage:"54",                    size:"70×145×40",      sizeNote:"mm", industry:"網通",       note:"研發中",     specPdf:"TG24-0090-01c.pdf" },
  { watt:"135W",       model:"TG14-0135-01", voltage:"24",                    size:"100×207×40",     sizeNote:"mm", industry:"工業",       note:"",           specPdf:"TG14-0135-01c.pdf" },
  { watt:"175W",       model:"TG23-0175-01", voltage:"雙組(5/12)",             size:"99×145×41",      sizeNote:"mm", industry:"工業",       note:"研發中",     specPdf:"TG23-0175-01c.pdf" },
  { watt:"250W",       model:"TG24-0250-01", voltage:"12",                    size:"73.5×185×40",    sizeNote:"mm", industry:"網通",       note:"CRPS / 研發中", specPdf:"TG24-0250-01c.pdf" },

  { watt:"250W",       model:"TG22-0250-XX", voltage:"12/54",                 size:"94×203×55",      sizeNote:"mm", industry:"網通",       note:"研發中",     specPdf:"TG22-0250-XXc.pdf" },

  { watt:"350W",       model:"TG21-0350-02", voltage:"24",                    size:"115.5×215×29",   sizeNote:"mm", industry:"工業",       note:"",           specPdf:"TG21-0350-02c.pdf" },
  { watt:"550W",       model:"TG23-0550-01", voltage:"57",                    size:"73.5×185×40",    sizeNote:"mm", industry:"網通",       note:"研發中",     specPdf:"TG23-0550-01c.pdf" },
  { watt:"589W",       model:"TG10-0589-01", voltage:"雙組(12/54)",            size:"127×254×41.5",   sizeNote:"mm", industry:"網通",       note:"",           specPdf:"TG10-0589-01c.pdf" },
  { watt:"600W",       model:"TG19-0600-01", voltage:"24",                    size:"235×120×61",     sizeNote:"mm", industry:"工業",       note:"",           specPdf:"TG19-0600-01c.pdf" },
  { watt:"760W",       model:"TG23-0760-02", voltage:"雙組(3.3/12)",           size:"54.5×322×40",    sizeNote:"mm", industry:"網通",       note:"研發中",     specPdf:"TG23-0760-02c.pdf" },
  { watt:"960W",       model:"TG21-0960-01", voltage:"雙組(5/24)",             size:"127×295×41",     sizeNote:"mm", industry:"工業",       note:"",           specPdf:"TG21-0960-01c.pdf" },
  { watt:"1010W",      model:"TG17-1000-01", voltage:"雙組(5/48)",             size:"127×295×41",     sizeNote:"mm", industry:"工業",       note:"",           specPdf:"TG17-1000-01c.pdf" },
  { watt:"1100W",      model:"TG20-1100-XX", voltage:"雙組(12/12)",            size:"50.5×240×40",    sizeNote:"mm", industry:"工業",       note:"",           specPdf:"TG20-1100-XXc.pdf" },
  { watt:"1200W",      model:"TG25-1200-XX", voltage:"12/24/36/48/54",        size:"190×127×41",     sizeNote:"mm", industry:"工業",       note:"",           specPdf:"TG25-1200-XX_SPEC.pdf" },
  { watt:"電競 1200W", model:"TG23-1200-01", voltage:"五組(3.3/5/12/-12/5)",   size:"125×125×63.5",   sizeNote:"mm", industry:"電競主機",   note:"研發中",     specPdf:"TG23-1200-01c.pdf" },
  { watt:"1600W",      model:"TG17-1600-XX", voltage:"雙組(12/54)",            size:"73.5×185×40",    sizeNote:"mm", industry:"工業",       note:"研發中",     specPdf:"TG17-1600-XXc.pdf" },

const adaptor = [
  { watt:"60/65W", model:"TG15-0065-24", voltage:"24",  size:"62×110×32",     sizeNote:"mm", industry:"工業", note:"", specPdf:"TG15-0065-XXc.pdf" },
  { watt:"60/65W", model:"TG15-0065-48", voltage:"48",  size:"62×110×32",     sizeNote:"mm", industry:"工業", note:"", specPdf:"TG15-0065-XXc.pdf" },
  { watt:"75W",    model:"TG-7601-ES",   voltage:"24",  size:"80×165×50",     sizeNote:"mm", industry:"工業", note:"", specPdf:"TG-7601-ESc.pdf" },
  { watt:"180W",   model:"TG16-0180-01", voltage:"24",  size:"86.5×203×51.5", sizeNote:"mm", industry:"工業", note:"", specPdf:"TG16-0180-01c.pdf" },
].map(d=>({...d, type:"ad"}));

const allData = [...openFrame, ...enclosed, ...adaptor];

// ── state ─────────────────────────────────────────────────
let activeTab = "all";
let activeWatt = null, activeVolt = null, activeInd = null;
let searchQ = "";

// ── helpers ───────────────────────────────────────────────
function getActiveData() {
  if (activeTab === "of") return openFrame;
  if (activeTab === "en") return enclosed;
  if (activeTab === "ad") return adaptor;
  return allData;
}

function voltageMatch(item, v) {
  return item.voltage.includes(v);
}

function getFiltered() {
  let data = getActiveData();
  if (activeWatt) data = data.filter(d => d.watt === activeWatt);
  if (activeVolt) data = data.filter(d => voltageMatch(d, activeVolt));
  if (activeInd)  data = data.filter(d => d.industry.includes(activeInd));
  if (searchQ)    data = data.filter(d => d.model.toLowerCase().includes(searchQ.toLowerCase()));
  return data;
}

// ── dynamic filter options ────────────────────────────────
function getOptions(field) {
  const data = getActiveData();
  const seen = new Set();
  return data.map(d => d[field]).filter(v => { if (seen.has(v)) return false; seen.add(v); return true; });
}

function getVoltOptions() {
  const data = getActiveData();
  const seen = new Set();
  const out = [];
  data.forEach(d => {
    d.voltage.split(/[\/,()]/).forEach(seg => {
      const s = seg.trim().replace(/[^0-9.V]/g,'');
      const n = parseFloat(s);
      if (!isNaN(n) && !seen.has(n)) { seen.add(n); out.push(n); }
    });
  });
  return out.sort((a,b)=>a-b).map(n => n % 1 === 0 ? String(n) : String(n));
}

// ── render filter buttons ─────────────────────────────────
function renderFilters() {
  const wOpts = getOptions("watt");
  const vOpts = getVoltOptions();
  const iOpts = ["工業","網通","5G網通","電競主機","醫療"].filter(x => getActiveData().some(d => d.industry.includes(x)));

  renderBtnGroup("wattBtns", wOpts, activeWatt, v => { activeWatt = activeWatt===v?null:v; renderAll(); });
  renderBtnGroup("voltBtns", vOpts, activeVolt, v => { activeVolt = activeVolt===v?null:v; renderAll(); });
  renderBtnGroup("indBtns",  iOpts, activeInd,  v => { activeInd  = activeInd===v?null:v; renderAll(); });
}

function renderBtnGroup(id, opts, active, onClick) {
  const el = document.getElementById(id);
  el.innerHTML = opts.map(v => `<button class="filter-btn${active===String(v)?' active':''}" data-val="${v}">${v}</button>`).join('');
  el.querySelectorAll('.filter-btn').forEach(b => b.addEventListener('click', () => onClick(b.dataset.val)));
}

// ── render active tags ────────────────────────────────────
function renderTags() {
  const tags = [];
  if (activeWatt) tags.push({label:"W: "+activeWatt, clear:()=>{activeWatt=null;renderAll();}});
  if (activeVolt) tags.push({label:"V: "+activeVolt, clear:()=>{activeVolt=null;renderAll();}});
  if (activeInd)  tags.push({label:"業: "+activeInd, clear:()=>{activeInd=null;renderAll();}});
  const wrap = document.getElementById("activeTagsWrap");
  wrap.innerHTML = tags.map((_,i)=>`<div class="active-tag"><span>${tags[i].label}</span><span class="rm" data-i="${i}">✕</span></div>`).join('');
  wrap.querySelectorAll('.rm').forEach(r => r.addEventListener('click', () => tags[+r.dataset.i].clear()));
  const cf = document.getElementById("clearFilters");
  if (tags.length > 0) cf.classList.add("visible"); else cf.classList.remove("visible");
}

// ── highlight search ──────────────────────────────────────
function hl(text, q) {
  if (!q) return text;
  return text.replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'), m=>`<mark>${m}</mark>`);
}

// ── render cards ──────────────────────────────────────────
function renderCards() {
  const filtered = getFiltered();
  const container = document.getElementById("cardsContainer");
  const noResult = document.getElementById("noResult");
  const meta = document.getElementById("resultMeta");

  // stats
  const ofN = filtered.filter(d=>d.type==='of').length;
  const enN = filtered.filter(d=>d.type==='en').length;
  const adN = filtered.filter(d=>d.type==='ad').length;
  const parts = [];
  if (ofN) parts.push(`<span style="color:var(--accent-of)">${ofN} Open Frame</span>`);
  if (enN) parts.push(`<span style="color:var(--accent-en)">${enN} Enclosed</span>`);
  if (adN) parts.push(`<span style="color:var(--accent-ad)">${adN} Adaptor</span>`);
  meta.innerHTML = filtered.length ? `共 ${filtered.length} 筆 — ${parts.join('，')}` : '';

  if (!filtered.length) {
    container.innerHTML = '';
    noResult.style.display = 'block';
    return;
  }
  noResult.style.display = 'none';

  container.innerHTML = filtered.map(item => `
<div class="card type-${item.type}">
  <div class="card-top">
    <div>
      <div class="card-model">${hl(item.model, searchQ)}</div>
      <div class="type-badge">${item.type==='of'?'OPEN FRAME':item.type==='en'?'ENCLOSED':'ADAPTOR'}</div>
    </div>
    <div class="card-watt">${item.watt}</div>
  </div>
  <div class="card-fields">
    ${item.voltage?`<div class="card-field"><div class="field-label">電壓</div><div class="field-value">${item.voltage}</div></div>`:''}
    ${item.size?`<div class="card-field"><div class="field-label">尺寸</div><div class="field-value">${item.size} <span style="font-size:10px;color:var(--text-muted)">${item.sizeNote||''}</span></div></div>`:''}
    ${item.industry?`<div class="card-field"><div class="field-label">產業</div><div class="field-value">${item.industry}</div></div>`:''}
    ${item.note?`<div class="card-field"><div class="field-label">備註</div><div class="field-value note-val ${item.note==='研發中'?'dev':item.note==='CRPS'||item.note==='CRPS / 研發中'?'crps':'red'}">${item.note}</div></div>`:''}
  </div>
  <div class="card-actions">
    <button class="copy-btn" data-copy="${item.model}">複製料號</button>
    ${item.specPdf?`<button class="copy-btn" onclick="window.open('${item.specPdf}','_blank')">規格書 PDF</button>`:''}
  </div>
</div>`).join('');

  container.querySelectorAll('.copy-btn[data-copy]').forEach(btn => {
    btn.addEventListener('click', () => {
      navigator.clipboard.writeText(btn.dataset.copy).then(() => {
        btn.textContent = '✓ 已複製';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = '複製料號'; btn.classList.remove('copied'); }, 1500);
      });
    });
  });
}

// ── tab logic ─────────────────────────────────────────────
function renderAll() {
  renderFilters();
  renderTags();
  renderCards();
}

document.getElementById("tabBar").addEventListener("click", e => {
  const tab = e.target.closest(".tab");
  if (!tab) return;
  activeTab = tab.dataset.type;
  activeWatt = null; activeVolt = null; activeInd = null;
  document.querySelectorAll(".tab").forEach(t => t.className = "tab");
  tab.className = `tab active-${activeTab}`;
  renderAll();
});

document.getElementById("clearAllBtn").addEventListener("click", () => {
  activeWatt = null; activeVolt = null; activeInd = null;
  renderAll();
});

renderAll();
</script>
</body>
</html>
